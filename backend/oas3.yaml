          example: mario_rossi
        password:
          type: string
          format: password
          example: PasswordSicura123!
    LoginResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: Login effettuato con successo
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        data:
          type: object
          properties:
            id:
              type: string
              pattern: "^[a-fA-F0-9]{24}$"
