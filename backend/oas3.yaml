openapi: 3.0.0
info:
  version: "1.0"
  title: TrentinGO API
  description: API per la gestione di TrentinGO
servers:
  - url: "http://localhost:3001/api/v1"
    description: Localhost
paths:
  /pdi:
    get:
      summary: Ottieni la lista di tutti i PDI
      tags:
        - PDI
      responses:
        "200":
          description: Lista recuperata con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: Lista dei PDI
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PDI"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaTuttiPdi
    post:
      summary: Crea un nuovo PDI
      tags:
        - PDI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PDIUploadInput"
      responses:
        "201":
          description: PDI creato con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: PDI creato con successo
                  data:
                    $ref: "#/components/schemas/PDI"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: creaPdi
      security:
        - token: []
  "/pdi/{id}":
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        description: L'ID univoco del PDI
    get:
      summary: Visualizza un PDI specifico
      tags:
        - PDI
      responses:
        "200":
          description: PDI recuperato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PDI"
        "404":
          description: PDI non trovato
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaPdi
    put:
      summary: Modifica un PDI esistente
      tags:
        - PDI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PDIUpdateInput"
      responses:
        "200":
          description: PDI aggiornato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: PDI aggiornato con successo
                  data:
                    $ref: "#/components/schemas/PDI"
        "400":
          description: Errore di validazione o nome già esistente
          $ref: "#/components/responses/ErrorResponse"
        "404":
          description: PDI non trovato
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      parameters: []
      operationId: modificaPdi
      security:
        - token: []
    delete:
      summary: Elimina un PDI esistente
      tags:
        - PDI
      responses:
        "200":
          description: PDI eliminato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: PDI eliminato con successo
                  data:
                    $ref: "#/components/schemas/PDI"
        "404":
          description: PDI non trovato
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: eliminaPdi
      security:
        - token: []
  /eventi:
    get:
      description: ""
      tags:
        - eventi
      parameters: []
      responses:
        "200":
          description: Lista eventi recuperata
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: stoald617n7zh
                    example: Lista degli eventi
                  data:
                    x-stoplight:
                      id: rtlxhrsjihj4j
                    type: array
                    items:
                      $ref: "#/components/schemas/Evento"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: mwmdaegv6z31f
      x-stoplight:
        id: of2rkrjle76j5
      operationId: visualizzaTuttiEventi
      summary: Ottieni la lista di tutti gli eventi
    post:
      summary: Crea un nuovo evento
      tags:
        - eventi
      responses:
        "201":
          description: Evento creato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: fccjq4c00wtcj
                    default: Evento creato con successo
                  data:
                    $ref: "#/components/schemas/Evento"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: yqs8qn4r3gy3s
                    example: Dati mancanti
        "404":
          description: PDI non trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: h98zedvf5cycx
                    default: PDI non trovato
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: cfakca2s2h0ep
                    example: Errore nella creazione dell'evento
      operationId: creaEvento
      x-stoplight:
        id: vfrwufqpr82fl
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/EventoUploadInput"
      description: ""
      security:
        - token: []
    parameters: []
  "/eventi/{idEvento}":
    get:
      summary: Visualizza un evento specifico
      tags:
        - eventi
      responses:
        "200":
          description: Evento trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: 71j2w7pvqf3ix
                    default: Evento trovato
                  data:
                    $ref: "#/components/schemas/Evento"
        "404":
          description: Evento non trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: v0r3awt4qqs2u
                    default: Evento non trovato
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  "":
                    type: string
                    x-stoplight:
                      id: 3sgqcg6oo4wmn
                    example: Errore nella visualizzazione dell'evento
      operationId: visualizzaEvento
      x-stoplight:
        id: z8ve41hvbdnam
      parameters:
        - schema:
            type: string
          in: query
          name: idEvento
      description: ""
    put:
      summary: Modifica un evento
      tags:
        - eventi
      responses:
        "200":
          description: Evento aggiornato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: e5nerbrosukr5
                    default: Evento aggiornato con successo
                  data:
                    $ref: "#/components/schemas/Evento"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: 8rvh4o5a62twf
                    example: Dati mancanti
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: r5so79dqe4p6r
                    example: Evento non trovato
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: 19744xe7s2r5x
                    example: Errore nella modifica dell'evento
      operationId: modificaEvento
      x-stoplight:
        id: 528jqk696r8qy
      parameters:
        - schema:
            type: string
          in: query
          name: idEvento
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PDIUpdateInput"
      security:
        - token: []
    delete:
      summary: Elimina un evento
      tags:
        - eventi
      responses:
        "200":
          description: Evento eliminato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: f2jlkdhiqfg43
                    default: Evento eliminato con successo
                  data:
                    $ref: "#/components/schemas/Evento"
        "404":
          description: Evento non trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: at87h7g5votju
                    default: Evento non trovato
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: 4c3qur49t7m41
                    default: Errore interno del server
      operationId: eliminaEvento
      x-stoplight:
        id: fobxdohxpmyu0
      parameters:
        - schema:
            type: string
          in: query
          name: idEvento
      security:
        - token: []
  /richieste-associazione:
    get:
      summary: Ottieni la lista delle richieste di associazione
      tags:
        - richieste-associazione
      parameters:
        - in: query
          name: gestore
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{24}$"
          description: Filtra le richieste per ID gestore
      responses:
        "200":
          description: Lista recuperata con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: Lista delle richieste di associazione
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RichiestaAssociazionePDI"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaRichiesteAssociazione
      security:
        - token: []
    post:
      summary: Invia una nuova richiesta di associazione a un PDI
      tags:
        - richieste-associazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RichiestaAssociazionePDIInput"
      responses:
        "201":
          description: Richiesta inviata con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: Richiesta di associazione inviata con successo
                  data:
                    $ref: "#/components/schemas/RichiestaAssociazionePDI"
        "400":
          description: Campi obbligatori mancanti o richiesta già esistente
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Esiste già una richiesta pendente per questo PDI
        "404":
          description: PDI non trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: PDI non trovato
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: creaRichiestaAssociazione
      security:
        - token: []
  "/richieste-associazione/{id}":
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        description: L'ID univoco della richiesta di associazione
    get:
      summary: Visualizza una richiesta di associazione specifica
      tags:
        - richieste-associazione
      responses:
        "200":
          description: Richiesta recuperata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RichiestaAssociazionePDI"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaRichiestaAssociazione
      security:
        - token: []
    put:
      summary: Aggiorna lo stato di una richiesta (approva o rifiuta)
      tags:
        - richieste-associazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - stato
              properties:
                stato:
                  type: string
                  enum:
                    - approvata
                    - rifiutata
                  example: approvata
      responses:
        "200":
          description: Stato aggiornato con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: Richiesta approvata con successo
                  data:
                    $ref: "#/components/schemas/RichiestaAssociazionePDI"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: aggiornaStatoRichiesta
      security:
        - token: []
    delete:
      summary: Elimina una richiesta di associazione
      tags:
        - richieste-associazione
      responses:
        "200":
          description: Richiesta eliminata con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: Richiesta eliminata con successo
                  data:
                    $ref: "#/components/schemas/RichiestaAssociazionePDI"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: eliminaRichiestaAssociazione
      security:
        - token: []
  /gestori:
    get:
      summary: Ottieni la lista di tutti i gestori
      tags:
        - gestori
      responses:
        "200":
          description: Lista dei gestori recuperata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Lista dei gestori
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Gestore"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaGestori
      security:
        - token: []
    post:
      summary: Registra un nuovo gestore
      tags:
        - gestori
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GestoreRegistrationInput"
      responses:
        "201":
          description: Gestore registrato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Gestore registrato con successo
                  data:
                    $ref: "#/components/schemas/Gestore"
        "400":
          description: Campi obbligatori mancanti
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "nome, email, password e partitaIva sono obbligatori"
        "409":
          description: "Nome, email o partita IVA già esistente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Partita IVA già esistente
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: registrazioneGestore
      security:
        - token: []
  "/gestori/{id}":
    parameters:
      - schema:
          type: string
        name: id
        in: path
        required: true
      - in: path
        name: id
        required: true
        schema:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        description: L'ID univoco del gestore
    get:
      summary: Visualizza un gestore specifico
      tags:
        - gestori
      responses:
        "200":
          description: Gestore recuperato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Gestore"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaGestore
      security:
        - token: []
    put:
      summary: Modifica un gestore
      tags:
        - gestori
      responses:
        "200":
          description: Il gestore è stato aggiornato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: 9aicj4tiycdpg
                    example: Utente aggiornato con successo
        "401":
          description: Errore nell'autenticazione
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: 4sto5ibs3eh1h
                    example: Token non valido o scaduto
        "403":
          description: Non si hanno i permessi necessari per modificare il gestore
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: ml22s0bc1kj7c
                    example: Non hai i permessi per modificare i dati di altri utenti
        "404":
          description: L'utente che si vuole modificare non è stato trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: ocl8ba97wl13y
                    example: Utente non trovato
        "409":
          description: Username o email già in uso da qualcun'altro
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: wr12npak5z5pm
                    example: Username già in uso
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: y5p4eio8su3qv
                    example: Errore interno del server
      operationId: modificaGestore
      x-stoplight:
        id: nyh6qz9aroitz
      description: Modifica le informazioni di un gestore
      parameters:
        - schema:
            type: string
          in: query
          name: idUtente
      security:
        - token: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  x-stoplight:
                    id: 8bssrqczu0yec
                email:
                  type: string
                  x-stoplight:
                    id: 5giexn1aus5an
  "/gestori/abilitato/{id}":
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        description: L'ID univoco del gestore
    put:
      summary: Abilita o disabilita un gestore
      tags:
        - gestori
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AbilitaGestoreInput"
      responses:
        "200":
          description: Gestore abilitato/disabilitato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Gestore abilitato con successo
                  data:
                    $ref: "#/components/schemas/Gestore"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: abilitaGestore
      security:
        - token: []
  /login:
    post:
      summary: Login unificato per gli utenti
      tags:
        - autenticazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredenzialeLoginInput"
      responses:
        "200":
          description: Login effettuato con successo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          description: Credenziali non valide
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Credenziali non valide
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: login
  /datiUtente:
    get:
      summary: Ottieni i dati unificati dell'utente loggato
      tags:
        - autenticazione
      security:
        - token: []
      responses:
        "200":
          description: Profilo recuperato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profilo recuperato con successo
                  data:
                    type: object
                    description: "Dati dinamici (variano se è Giocatore, Gestore o Admin)"
                    properties:
                      _id:
                        type: string
                        example: 6641a2f3e4b0c12d3f456789
                      email:
                        type: string
                        example: utente@email.com
                      ruolo:
                        type: string
                        example: giocatore
        "400":
          description: Ruolo non riconosciuto
        "404":
          description: Utente non trovato
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaProfilo
  /amministratori:
    get:
      summary: Ottieni la lista di tutti gli amministratori
      tags:
        - amministratori
      responses:
        "200":
          description: Lista degli amministratori recuperata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Lista degli Amministratori
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Amministratore"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaAmministratori
      security:
        - token: []
    post:
      summary: Crea un nuovo amministratore
      tags:
        - amministratori
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmministratoreRegistrationInput"
      responses:
        "201":
          description: Amministratore creato con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: Amministratore creato con successo
                  data:
                    $ref: "#/components/schemas/Amministratore"
        "400":
          description: Campi obbligatori mancanti
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Username, email e password sono obbligatori"
        "409":
          description: Username o email già esistente
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Username già esistente
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: creaAmministratore
      security:
        - token: []
  /amministratori/login:
    post:
      summary: Login di un amministratore
      tags:
        - amministratori
      requestBody:
