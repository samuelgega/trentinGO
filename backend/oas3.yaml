openapi: 3.0.0
info:
  version: "1.0"
  title: TrentinGO API
  description: API per la gestione di TrentinGO
servers:
  - url: "http://localhost:3001/api/v1"
    description: Localhost
paths:
  /pdi:
    get:
      summary: Ottieni la lista di tutti i PDI
      tags:
        - PDI
      responses:
        "200":
          description: Lista recuperata con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: Lista dei PDI
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PDI"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaTuttiPdi
    post:
      summary: Crea un nuovo PDI
      tags:
        - PDI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PDIUploadInput"
      responses:
        "201":
          description: PDI creato con successo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  message:
                    type: string
                    example: PDI creato con successo
                  data:
                    $ref: "#/components/schemas/PDI"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: creaPdi
      security:
        - token: []
  "/pdi/{id}":
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        description: L'ID univoco del PDI
    get:
      summary: Visualizza un PDI specifico
      tags:
        - PDI
      responses:
        "200":
          description: PDI recuperato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PDI"
        "404":
          description: PDI non trovato
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaPdi
    put:
      summary: Modifica un PDI esistente
      tags:
        - PDI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PDIUpdateInput"
      responses:
        "200":
          description: PDI aggiornato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: PDI aggiornato con successo
                  data:
                    $ref: "#/components/schemas/PDI"
        "400":
          description: Errore di validazione o nome già esistente
          $ref: "#/components/responses/ErrorResponse"
        "404":
          description: PDI non trovato
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      parameters: []
      operationId: modificaPdi
      security:
        - token: []
    delete:
      summary: Elimina un PDI esistente
      tags:
        - PDI
      responses:
        "200":
          description: PDI eliminato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: PDI eliminato con successo
                  data:
                    $ref: "#/components/schemas/PDI"
        "404":
          description: PDI non trovato
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: eliminaPdi
      security:
        - token: []
  /eventi:
    get:
      description: ""
      tags:
        - eventi
      parameters: []
      responses:
        "200":
          description: Lista eventi recuperata
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: stoald617n7zh
                    example: Lista degli eventi
                  data:
                    x-stoplight:
                      id: rtlxhrsjihj4j
                    type: array
                    items:
                      $ref: "#/components/schemas/Evento"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: mwmdaegv6z31f
      x-stoplight:
        id: of2rkrjle76j5
      operationId: visualizzaTuttiEventi
      summary: Ottieni la lista di tutti gli eventi
    post:
      summary: Crea un nuovo evento
      tags:
        - eventi
      responses:
        "201":
          description: Evento creato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: fccjq4c00wtcj
                    default: Evento creato con successo
                  data:
                    $ref: "#/components/schemas/Evento"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: yqs8qn4r3gy3s
                    example: Dati mancanti
        "404":
          description: PDI non trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: h98zedvf5cycx
                    default: PDI non trovato
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: cfakca2s2h0ep
                    example: Errore nella creazione dell'evento
      operationId: creaEvento
      x-stoplight:
        id: vfrwufqpr82fl
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/EventoUploadInput"
      description: ""
      security:
        - token: []
  "/eventi/{idEvento}":
    get:
      summary: Visualizza un evento specifico
      tags:
        - eventi
      responses:
        "200":
          description: Evento trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: 71j2w7pvqf3ix
                    default: Evento trovato
                  data:
                    $ref: "#/components/schemas/Evento"
        "404":
          description: Evento non trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: v0r3awt4qqs2u
                    default: Evento non trovato
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  "":
                    type: string
                    x-stoplight:
                      id: 3sgqcg6oo4wmn
                    example: Errore nella visualizzazione dell'evento
      operationId: visualizzaEvento
      x-stoplight:
        id: z8ve41hvbdnam
      parameters:
        - schema:
            type: string
          in: path
          name: idEvento
          required: true
      description: ""
    put:
      summary: Modifica un evento
      tags:
        - eventi
      responses:
        "200":
          description: Evento aggiornato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: e5nerbrosukr5
                    default: Evento aggiornato con successo
                  data:
                    $ref: "#/components/schemas/Evento"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: 8rvh4o5a62twf
                    example: Dati mancanti
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: r5so79dqe4p6r
                    example: Evento non trovato
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: 19744xe7s2r5x
                    example: Errore nella modifica dell'evento
      operationId: modificaEvento
      x-stoplight:
        id: 528jqk696r8qy
      parameters:
        - schema:
            type: string
          in: path
          name: idEvento
          required: true
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/EventoUploadInput"
      security:
        - token: []
    delete:
      summary: Elimina un evento
      tags:
        - eventi
      responses:
        "200":
          description: Evento eliminato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: f2jlkdhiqfg43
                    default: Evento eliminato con successo
                  data:
                    $ref: "#/components/schemas/Evento"
        "404":
          description: Evento non trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: at87h7g5votju
                    default: Evento non trovato
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: 4c3qur49t7m41
                    default: Errore interno del server
      operationId: eliminaEvento
      x-stoplight:
        id: fobxdohxpmyu0
      parameters:
        - schema:
            type: string
          in: path
          name: idEvento
          required: true
      security:
        - token: []
  /eventi/gestore:
    get:
      summary: Recupera gli eventi creati dal gestore autenticato
      description: Restituisce una lista di tutti gli eventi creati dal gestore attualmente loggato. L'ID del gestore viene letto in modo sicuro dal token JWT. Include i dati popolati del PDI collegato e i percorsi assoluti delle immagini.
      tags:
        - Eventi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista degli eventi recuperata con successo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Array di oggetti Evento.
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          example: "Feature"
                        geometry:
                          type: object
                          properties:
                            type:
                              type: string
                              example: "Point"
                            coordinates:
                              type: array
                              items:
                                type: number
                              example: [11.12108, 46.06787]
                        properties:
                          type: object
                          properties:
                            nome:
                              type: string
                              example: "Concerto in Piazza"
                            categoria:
                              type: string
                              example: "Musica"
                            immagine:
                              type: array
                              items:
                                type: string
                              example: ["http://localhost:3001/uploads/img1.jpg"]
                            idGestore:
                              type: string
                              example: "60d5ec49f1b2c8a1b4e5d6a1"
                            pdiCollegato:
                              type: object
                              description: Oggetto PDI popolato dal database.
        '404':
          description: Nessun evento trovato per il gestore specificato.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Nessun evento trovato"
        '500':
          description: Errore interno del server durante la ricerca degli eventi.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Errore interno"
  /login:
    post:
      summary: Login unificato per gli utenti
      tags:
        - autenticazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredenzialeLoginInput"
      responses:
        "200":
          description: Login effettuato con successo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          description: Credenziali non valide
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Credenziali non valide
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: login
  /datiUtente:
    get:
      summary: Ottieni i dati unificati dell'utente loggato
      tags:
        - autenticazione
      security:
        - token: []
      responses:
        "200":
          description: Profilo recuperato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profilo recuperato con successo
                  data:
                    type: object
                    description: "Dati dinamici (variano se è Giocatore, Gestore o Admin)"
                    properties:
                      _id:
                        type: string
                        example: 6641a2f3e4b0c12d3f456789
                      email:
                        type: string
                        example: utente@email.com
                      ruolo:
                        type: string
                        example: giocatore
                      puntiEsperienza:
                        type: number
                        default: 0
                        example: 40
                        description: Presente solo se ruolo è giocatore
                      livello:
                        type: number
                        default: 1
                        example: 3
                        description: Presente solo se ruolo è giocatore
        "400":
          description: Ruolo non riconosciuto
        "404":
          description: Utente non trovato
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaProfilo
  /resetPassword:
    post:
      summary: Richiesta reset password
      tags:
        - resetPassword
      responses:
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: nn3b7eo6pz8zx
                    example: Errore interno del server
        2XX:
          description: Token generato e inviato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: sw4b31gcwtfce
                    example: E' stata mandata una mail con le istruzioni per il recupero password
      operationId: richiestaResetPassword
      x-stoplight:
        id: jmkipse8p1ivi
      description: Genera un token per il reset password e lo invia alla mail dell'utente
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  x-stoplight:
                    id: y0v8lytzscgp9
                  example: utente@mail.com
  "/resetPassword/{token}":
    parameters:
      - schema:
          type: string
        name: token
        in: path
        required: true
    put:
      summary: Reset password
      tags:
        - resetPassword
      responses:
        "200":
          description: Passoword ripristinata
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: kwp4cnul3x5rn
                    example: Password resettata con successo
        "400":
          description: Password non valida o token insistente/scaduto
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: kp1omonp5ztbv
                    example: Token non valido o scaduto
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: qlmq1c11fjvsd
                    example: Errore interno del server
      operationId: resetPassword
      x-stoplight:
        id: yphd0z3o3l0nj
      description: "Dato il token, reimposta la password dell'utente"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nuovaPassword:
                  type: string
                  x-stoplight:
                    id: 5wty2c7iyb3v7
  /cambiaPassword:
    put:
      summary: Cambia la password dell'utente autenticato
      description: Permette a qualsiasi utente loggato (giocatore, gestore o amministratore) di cambiare la propria password. È necessario fornire la password corrente per autorizzare l'operazione.
      tags:
        - autenticazione
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - attuale
                - nuova
              properties:
                attuale:
                  type: string
                  format: password
                  description: La password attualmente in uso.
                  example: "VecchiaPassword123!"
                nuova:
                  type: string
                  format: password
                  description: La nuova password desiderata.
                  example: "NuovaPassword456!"
      responses:
        '200':
          description: Operazione completata con successo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password aggiornata con successo"
        '400':
          description: Payload incompleto o non valido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Password attuale e nuova sono obbligatorie"
        '401':
          description: Non autorizzato. La password attuale inserita non coincide con quella nel database.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Password attuale non corretta"
        '404':
          description: L'utente associato al token non è stato trovato nel database.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Utente non trovato"
        '500':
          description: Errore interno del server durante l'hashing o il salvataggio.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Errore interno del server"
  /giocatori:
    get:
      summary: Ottieni la lista di tutti i giocatori
      tags:
        - giocatori
      responses:
        "200":
          description: Lista dei giocatori recuperata con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Lista dei giocatori
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Giocatore"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaGiocatori
      security:
        - token: []
    post:
      summary: Registra un nuovo giocatore
      tags:
        - giocatori
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiocatoreRegistrationInput"
      responses:
        "200":
          description: Giocatore registrato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Giocatore registrato con successo
                  data:
                    $ref: "#/components/schemas/Giocatore"
        "400":
          description: Bad Request (dati mancanti o duplicati)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Username già esistente
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: registrazioneGiocatore
  "/giocatori/{id}":
    parameters:
      - schema:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        name: id
        in: path
        required: true
        description: L'ID univoco del giocatore
    get:
      summary: Visualizza un singolo giocatore
      tags:
        - giocatori
      description: Restituisce i dati di un giocatore. Il giocatore può vedere solo i propri dati; l'amministratore può vedere quelli di chiunque.
      security:
        - token: []
      responses:
        "200":
          description: Giocatore recuperato con successo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Giocatore"
        "403":
          description: Non hai i permessi per visualizzare i dati di un altro utente
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Non hai i permessi per visualizzare i dati di un altro utente.
        "404":
          description: Giocatore non trovato
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
      operationId: visualizzaGiocatore
    put:
      summary: Modifica un giocatore
      tags:
        - giocatori
      responses:
        "200":
          description: Il giocatore è stato aggiornato
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    x-stoplight:
                      id: 9aicj4tiycdpg
                    example: Utente aggiornato con successo
        "401":
          description: Errore nell'autenticazione
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: 4sto5ibs3eh1h
                    example: Token non valido o scaduto
        "403":
          description: Non si hanno i permessi necessari per modificare il giocatore
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: ml22s0bc1kj7c
                    example: Non hai i permessi per modificare i dati di altri utenti
        "404":
          description: L'utente che si vuole modificare non è stato trovato
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: ocl8ba97wl13y
                    example: Utente non trovato
        "409":
          description: Username o email già in uso da qualcun'altro
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: wr12npak5z5pm
                    example: Username già in uso
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-stoplight:
                      id: y5p4eio8su3qv
                    example: Errore interno del server
      operationId: modificaGiocatore
      x-stoplight:
        id: azedwcd2dfzqw
      security:
        - token: []
      description: Modifica le informazioni di un giocatore
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  x-stoplight:
                    id: t7i2us74olht7
                email:
                  type: string
                  x-stoplight:
                    id: a7fh0x6nk3p35
    delete:
      summary: Elimina un profilo giocatore
      description: Elimina definitivamente il profilo di un giocatore dal database tramite il suo ID univoco.
      tags:
        - giocatori
      security:
        - token: []
      responses:
        '200':
          description: Operazione completata con successo. Il profilo è stato eliminato.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Giocatore eliminato con successo"
        '404':
          description: Il giocatore specificato non è stato trovato nel database.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
