components:
  responses:
    ErrorResponse:
      description: Risposta di Errore Standard
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              error:
                type: string
                maxLength: 255
                example: Errore interno del server
  schemas:
    RichiestaAssociazionePDIInput:
      type: object
      additionalProperties: false
      required:
        - richGestore
        - assPDI
      properties:
        richGestore:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
          description: ID del gestore che effettua la richiesta
          example: 6641a2f3e4b0c12d3f456789
        assPDI:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
          description: ID del PDI a cui si vuole essere associati
          example: 6641a2f3e4b0c12d3f456790
        motivazione:
          type: string
          maxLength: 500
          description: Motivazione facoltativa della richiesta
          example: Gestiamo questo museo da 10 anni e vorremmo essere associati ufficialmente.
    RichiestaAssociazionePDI:
      type: object
      additionalProperties: false
      properties:
        _id:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        richGestore:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
          description: ID del gestore che ha effettuato la richiesta
          example: 6641a2f3e4b0c12d3f456789
        assPDI:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
          description: ID del PDI richiesto
          example: 6641a2f3e4b0c12d3f456790
        stato:
          type: string
          enum:
            - in_attesa
            - approvata
            - rifiutata
          default: in_attesa
          example: in_attesa
        motivazione:
          type: string
          maxLength: 500
          description: Motivazione facoltativa della richiesta
          example: Gestiamo questo museo da 10 anni e vorremmo essere associati ufficialmente.
        dataRichiesta:
          type: string
          format: date-time
          example: "2026-05-23T10:30:00Z"
    GestoreLoginInput:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: muse@email.com
        password:
          type: string
          format: password
          example: PasswordSicura123!
    GestoreRegistrationInput:
      type: object
      required:
        - nome
        - email
        - password
        - partitaIva
      properties:
        nome:
          type: string
          example: MUSE Trento
        email:
          type: string
          format: email
          example: muse@email.com
        password:
          type: string
          format: password
          example: PasswordSicura123!
        partitaIva:
          type: string
          example: "00264570226"
    AbilitaGestoreInput:
      type: object
      additionalProperties: false
      required:
        - abilitato
      properties:
        abilitato:
          type: boolean
          example: true
          description: "True per approvare, false per sospendere il gestore"
    Gestore:
      type: object
      properties:
        _id:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        nome:
          type: string
          example: MUSE Trento
        email:
          type: string
          format: email
          example: muse@email.com
        partitaIva:
          type: string
          example: "00264570226"
        abilitato:
          type: boolean
          example: false
    AmministratoreRegistrationInput:
      type: object
      additionalProperties: false
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          example: admin1
        email:
          type: string
          format: email
          example: admin@trentingo.it
        password:
          type: string
          format: password
          example: PasswordSicura123!
    Amministratore:
      type: object
      additionalProperties: false
      properties:
        _id:
          type: string
          pattern: "^[a-fA-F0-9]{24}$"
        username:
          type: string
          example: admin1
        email:
          type: string
          format: email
          example: admin@trentingo.it
    CredenzialeLoginInput:
      type: object
      additionalProperties: false
      required:
        - credenziale
        - password
      properties:
        credenziale:
          type: string
          description: Email o username dell'utente
          example: mario_rossi
        password:
          type: string
          format: password
          example: PasswordSicura123!
    LoginResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
          example: Login effettuato con successo
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        data:
          type: object
          properties:
            id:
              type: string
              pattern: "^[a-fA-F0-9]{24}$"
            nome:
              type: string
              description: Username del giocatore o nome del gestore
              example: mario_rossi
            email:
              type: string
              format: email
              example: mario@example.com
            ruolo:
              type: string
              enum:
                - giocatore
                - gestore
